<!DOCTYPE html>
<html>
<head>
  <title>Consulta de Inscripción</title>
</head>
<body>

<h2>Consulta por DNI</h2>

<input type="text" id="dni" placeholder="Ingrese su DNI"><br><br>

<button onclick="consultar()">Consultar</button>

<p id="resultado"></p>

<script>
function consultar() {
  const dni = document.getElementById("dni").value;

  const script = document.createElement("script");

  const url = "https://script.google.com/macros/s/AKfycbxB-D7iZTG6WatqTCKzYbPhVSh5rEj5-Tf7gUV8eElmv_mSQ4MP8CRoIauTC20ppnbWSw/exec"
    + "?action=buscar"
    + "&dni=" + encodeURIComponent(dni)
    + "&callback=respuesta"
    + "&t=" + new Date().getTime();

  script.src = url;
  document.body.appendChild(script);
}

function respuesta(data) {
  document.getElementById("resultado").innerText = data.mensaje;
}
</script>

</body>
</html>
