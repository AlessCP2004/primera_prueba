<!DOCTYPE html>
<html>
<head>
  <title>Registro</title>
</head>
<body>

<h2>Registro</h2>

<input type="text" id="nombre" placeholder="Nombre"><br><br>
<input type="email" id="correo" placeholder="Correo"><br><br>

<button onclick="enviar()">Guardar</button>

<p id="resultado"></p>

<script>
function enviar() {
  const nombre = document.getElementById("nombre").value;
  const correo = document.getElementById("correo").value;

  const script = document.createElement("script");

  const url = "https://script.google.com/macros/s/AKfycbxB-D7iZTG6WatqTCKzYbPhVSh5rEj5-Tf7gUV8eElmv_mSQ4MP8CRoIauTC20ppnbWSw/exec"
    + "?action=guardar"
    + "&nombre=" + encodeURIComponent(nombre)
    + "&correo=" + encodeURIComponent(correo)
    + "&callback=respuesta"
    + "&t=" + new Date().getTime();

  script.src = url;
  document.body.appendChild(script);
}

function respuesta(data) {
  document.getElementById("resultado").innerText = data.mensaje;
}
</script>

</body>
</html>
