<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta de Inscripción</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 0 40px rgba(0, 200, 255, 0.2);
  animation: fadeIn 1s ease;
}

h2 {
  margin-bottom: 20px;
  color: #00eaff;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-bottom: 15px;
  font-size: 16px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00c6ff;
}

#resultado {
  margin-top: 20px;
  font-size: 15px;
  min-height: 40px;
}

.loader {
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #00eaff;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
  display: none;
}

.success {
  color: #00ffcc;
}

.error {
  color: #ff6b6b;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h2>Consulta de Inscripción</h2>

  <input type="text" id="dni" placeholder="Ingrese su DNI" maxlength="8">

  <button onclick="consultar()">Consultar</button>

  <div class="loader" id="loader"></div>

  <p id="resultado"></p>
</div>

<script>
function consultar() {
  const dni = document.getElementById("dni").value.trim();
  const resultado = document.getElementById("resultado");
  const loader = document.getElementById("loader");

  resultado.className = "";
  resultado.innerText = "";

  // Validación
  if (!/^\d{8}$/.test(dni)) {
    resultado.innerText = "El DNI debe tener exactamente 8 números";
    resultado.classList.add("error");
    return;
  }

  loader.style.display = "block";

  const script = document.createElement("script");

  const url = "https://script.google.com/macros/s/AKfycbxB-D7iZTG6WatqTCKzYbPhVSh5rEj5-Tf7gUV8eElmv_mSQ4MP8CRoIauTC20ppnbWSw/exec"
    + "?action=validar"
    + "&dni=" + encodeURIComponent(dni)
    + "&callback=respuesta"
    + "&t=" + new Date().getTime();

  script.src = url;
  document.body.appendChild(script);
}

function respuesta(data) {
  const resultado = document.getElementById("resultado");
  const loader = document.getElementById("loader");

  loader.style.display = "none";

  resultado.innerText = data.mensaje;

  if (data.status === "INSCRITO") {
    resultado.classList.add("success");
  } else {
    resultado.classList.add("error");
  }
}
</script>

</body>
</html>
